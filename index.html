<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUPO | Envía dinero de Italia a Bolivia sin comisiones</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <!-- CSS (rutas correctas) -->
  <link rel="stylesheet" href="css/carousel.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --red: #E63946;
      --yellow: #FFD166;
      --green: #06D6A0;
      --ink: #1e293b;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
    }
    .bo-stripe {
      height: 6px;
      background: linear-gradient(90deg, #E63946 0%, #E63946 33.33%, #FFD166 33.33%, #FFD166 66.66%, #06D6A0 66.66%, #06D6A0 100%);
    }
    header {
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      border-bottom: 1px solid #eee;
    }
    .logo img { height: 40px; }
    .country-pills {
      display: flex;
      gap: 10px;
    }
    .pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 15px;
      border-radius: 30px;
      text-decoration: none;
      color: #333;
    }
    .pill.active {
      background: #f0f0f0;
      color: var(--red);
    }
    .pill img { width: 20px; height: 20px; border-radius: 50%; }
    .login-btn {
      padding: 8px 20px;
      border: none;
      border-radius: 30px;
      background: var(--red);
      color: white;
      cursor: pointer;
    }
    .hero {
      background: #1a2e3f;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .hero h1 span { color: var(--yellow); }
    .container {
      max-width: 450px;
      margin: -20px auto 30px;
      padding: 0 20px;
    }
    .calculator-card {
      background: white;
      border-radius: 24px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .calc-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 15px;
    }
    .calc-title i { color: var(--red); }
    .submeta {
      display: flex;
      justify-content: space-between;
      background: #f8f9fa;
      padding: 10px 15px;
      border-radius: 30px;
      margin-bottom: 20px;
    }
    .chip {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--green);
      font-weight: 600;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
    }
    .currency-input-container {
      display: flex;
      align-items: center;
      border: 2px solid #e9ecef;
      border-radius: 16px;
      padding: 0 15px;
    }
    .currency-flag {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background-size: cover;
      margin-right: 10px;
    }
    .form-control {
      flex: 1;
      border: none;
      padding: 15px 0;
      font-size: 1rem;
      outline: none;
    }
    .btn-primary {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: white;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      margin: 20px 0;
    }
    .result-card {
      background: #f8f9fa;
      border-radius: 20px;
      padding: 20px;
      border-left: 4px solid var(--green);
    }
    .result-header {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #666;
      margin-bottom: 10px;
    }
    .result-amount {
      display: flex;
      align-items: baseline;
      gap: 5px;
      font-size: 2.5rem;
      font-weight: 700;
    }
    .result-amount small {
      font-size: 1rem;
      color: #666;
    }
    .result-details {
      color: #666;
    }
    .result-details p {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
    }
    footer {
      background: #1e293b;
      color: white;
      padding: 30px 20px;
      margin-top: 40px;
    }
    .footer-container {
      max-width: 450px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
    }
    .copyright {
      text-align: center;
      margin-top: 20px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="bo-stripe"></div>

  <header>
    <div class="logo">
      <img src="https://lupo.lat/img/lupo01.png" alt="LUPO">
    </div>
    <nav class="country-pills">
      <a class="pill active" href="#">
        <img src="https://flagcdn.com/w40/bo.png"> Bolivia
      </a>
      <a class="pill" href="#">
        <img src="https://flagcdn.com/w40/it.png"> Italia
      </a>
    </nav>
    <button class="login-btn">
      <i class="fa-solid fa-user"></i> Iniciar Sesión
    </button>
  </header>

  <section class="hero">
    <h1>Envía <span>Euros</span> a <span>Bolivianos</span> 🇧🇴</h1>
  </section>

  <main class="container">
    <div class="calculator-card">
      <div class="calc-title">
        <i class="fa-solid fa-calculator"></i> Calculadora de envío
      </div>

      <div class="submeta">
        <span class="chip"><span class="dot"></span> Activo</span>
        <span id="cotiz-datetime"></span>
      </div>

      <div class="form-group">
        <label>Tú envías (EUR)</label>
        <div class="currency-input-container">
          <div class="currency-flag" style="background-image:url('https://flagcdn.com/w40/it.png')"></div>
          <input type="number" id="amount" class="form-control" value="100" min="1">
        </div>
      </div>

      <div class="form-group">
        <label>Recibe (BOB)</label>
        <div class="currency-input-container">
          <div class="currency-flag" style="background-image:url('https://flagcdn.com/w40/bo.png')"></div>
          <input type="text" id="received-amount" class="form-control" readonly>
        </div>
      </div>

      <button class="btn-primary" id="calculate-btn">
        <i class="fa-brands fa-whatsapp"></i> Enviar dinero por WhatsApp
      </button>

      <div class="result-card">
        <div class="result-header">
          <i class="fa-regular fa-circle-check"></i> Detalles del envío
        </div>
        <div class="result-amount">
          Bs <span id="result-amount">0</span> <small>BOB</small>
        </div>
        <div class="result-details">
          <p><i class="fa-solid fa-percent"></i> <strong>Sin comisiones</strong> – 0% de tarifa</p>
          <p><i class="fa-regular fa-clock"></i> Tiempo estimado: 10–20 minutos</p>
        </div>
      </div>
    </div>

    <!-- CARRUSEL (rutas a imágenes correctas) -->
    <section class="bank-carousel-section">
      <h3 style="text-align:center; margin:30px 0 15px; color:#666;">BANCOS DONDE PUEDES RECIBIR</h3
