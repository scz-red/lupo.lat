<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Base -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>LUPO | Envía dinero de Bolivia a Venezuela sin comisiones</title>
  <meta name="description" content="Envía dinero de Bolivia a Venezuela sin comisiones. Cotiza en segundos y recibe en minutos con LUPO." />
  <meta name="keywords" content="envío dinero, remesas, Bolivia, Venezuela, sin comisiones, LUPO" />

  <!-- Social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="LUPO | Envía dinero de Bolivia a Venezuela" />
  <meta property="og:description" content="Envía dinero a Venezuela rápido, seguro y sin comisiones." />
  <meta property="og:image" content="https://lupo.lat/img/og-lupo.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- PWA -->
  <meta name="theme-color" content="#00247D" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <!-- CSS Venezuela -->
  <link rel="stylesheet" href="styles_ve.css">
</head>

<body>

  <!-- Tricolor Venezuela -->
  <div class="co-stripe"></div>

  <!-- HEADER -->
  <header>
    <div class="nav-container">
      <div class="logo">
        <img src="https://lupo.lat/img/lupo01.png" alt="LUPO" />
      </div>

      <nav class="country-pills">
        <span class="pill active">
          <img src="https://flagcdn.com/w40/ve.png" alt="Venezuela" />
          <span>Venezuela</span>
        </span>
        <span class="pill">
          <img src="https://flagcdn.com/w40/bo.png" alt="Bolivia" />
          <span>Bolivia</span>
        </span>
      </nav>

      <button class="login-btn">
        <i class="fa-solid fa-user"></i> Iniciar sesión
      </button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-inner">
      <div class="kicker">
        <span class="kdot"></span>
        <strong>Bolivia → Venezuela</strong>
        <span>•</span>
        <strong>0% comisiones</strong>
      </div>

      <h1>Envía <span>Bolivianos</span> a <span>Bolívares</span> 🇻🇪</h1>
      <p>La forma más rápida y segura de enviar dinero de Bolivia a Venezuela.</p>
    </div>
  </section>

  <!-- CALCULADORA -->
  <main class="container">
    <div class="calculator-card visible" id="calculator-card">
      <div class="calc-title">
        <i class="fa-solid fa-calculator"></i> Calculadora de envío
      </div>

      <div class="submeta">
        <span class="chip"><span class="dot"></span> Activo</span>
        <span id="cotiz-datetime"></span>
      </div>

      <div class="form-group">
        <label>Tú envías (BOB)</label>
        <div class="currency-input-container">
          <div class="currency-flag" style="background-image:url('https://flagcdn.com/w40/bo.png')"></div>
          <input type="number" id="amount" class="form-control" placeholder="Ej. 500">
        </div>
      </div>

      <div class="form-group">
        <label>Recibe (VES)</label>
        <div class="currency-input-container">
          <div class="currency-flag" style="background-image:url('https://flagcdn.com/w40/ve.png')"></div>
          <input type="text" id="received-amount" class="form-control" readonly>
        </div>
      </div>

      <button class="btn-primary" id="calculate-btn">
        <i class="fa-solid fa-paper-plane"></i> Enviar dinero por WhatsApp
      </button>

      <div class="result-card" id="result-card">
        <div class="result-amount">
          Bs <span id="result-amount">0</span> <small>VES</small>
        </div>
      </div>
    </div>
  </main>

  <!-- JS Venezuela -->
  <script src="app_ve.js"></script>
</body>
</html>
